user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  8192;
}

stream {
    # 定义日志格式
    log_format tcp_log '$remote_addr:$remote_port -> $upstream_addr [$time_local] $bytes_sent $bytes_received $session_time';
    access_log /var/log/nginx/stream_access.log tcp_log;

    # --- 定义第一个上游服务组 (对应 9200 端口) ---
    upstream backend_9200 {
        # 主节点
        # max_fails=3: 连续失败3次判定为不可用
        # fail_timeout=30s: 失败后暂停30秒，30秒后自动尝试重连（实现自动恢复）
        server 172.18.98.9:9200 max_fails=3 fail_timeout=30s;
        
        # 备节点 (假设备节点IP是 172.30.98.9，请替换为你真实的备节点IP)
        # backup 标记表示只有主节点挂了才用它
        server 172.30.98.9:9200 backup max_fails=3 fail_timeout=30s;
    }

    # --- 定义第二个上游服务组 (对应 8220 端口) ---
    upstream backend_8220 {
        # 主节点
        server 172.18.98.9:8220 max_fails=3 fail_timeout=30s;
        
        # 备节点 (请替换为你真实的备节点IP)
        server 172.30.98.9:8220 backup max_fails=3 fail_timeout=30s;
    }

    # --- 配置监听服务 ---
    server {
        listen 9200;
        # 指向定义好的 upstream 名称，而不是直接写 IP
        proxy_pass backend_9200;
        
        # 超时设置保持你原有的逻辑
        proxy_connect_timeout 5s;   
        proxy_timeout 10s;
        
        # 可选：开启重试，当连接失败时尝试下一个节点（通常默认行为已包含，但显式写出更保险）
        # 注意：stream 模块下 proxy_next_upstream 默认为 on (针对连接错误)
        proxy_next_upstream on;
        proxy_next_upstream_timeout 5s; # 尝试切换节点的总超时时间
    }    

    server {
        listen 8220;
        # 指向定义好的 upstream 名称
        proxy_pass backend_8220;
        
        proxy_connect_timeout 5s;
        proxy_timeout 30s;
        
        proxy_next_upstream on;
        proxy_next_upstream_timeout 5s;
    }
}
