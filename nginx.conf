worker_processes auto;
worker_rlimit_nofile 65535;
worker_shutdown_timeout 10s;

events {
    worker_connections 8192;
}

stream {
    log_format stream_basic '$time_local '
                            'client=$remote_addr:$remote_port '
                            'listen=$server_addr:$server_port '
                            'upstream=$upstream_addr '
                            'status=$status '
                            'bytes_sent=$bytes_sent '
                            'bytes_received=$bytes_received '
                            'session_time=$session_time';

    access_log /dev/stdout stream_basic;
    error_log  /dev/stderr info;

    server {
        listen 9200;
        proxy_pass 172.18.98.9:9200; # managed-by-failover TARGET_9200

        proxy_connect_timeout 2s;
        proxy_timeout 120s;
        proxy_socket_keepalive on;
    }

    server {
        listen 8220;
        proxy_pass 172.18.98.9:8220; # managed-by-failover TARGET_8220

        proxy_connect_timeout 2s;
        proxy_timeout 1h;
        proxy_socket_keepalive on;
    }
}
